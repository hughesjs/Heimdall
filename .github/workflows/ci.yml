name: CI

on:
  # CD owns master; CI gates pull requests.
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Heimdall.slnx

      - name: Build
        run: dotnet build Heimdall.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Heimdall.slnx --configuration Release --no-build --verbosity normal
